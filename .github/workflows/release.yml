name: Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write
  packages: write

jobs:
  image:
    name: Build + push image
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  chart:
    name: Package + publish chart
    runs-on: ubuntu-latest
    needs: image
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.3

      - name: Stamp chart version + image tag
        run: |
          VERSION="${{ steps.v.outputs.version }}"
          for chart in charts/mortise charts/mortise-core; do
            sed -i "s/^version: .*/version: ${VERSION}/" "${chart}/Chart.yaml"
            sed -i "s/^appVersion: .*/appVersion: \"${VERSION}\"/" "${chart}/Chart.yaml"
          done

      - name: Package charts
        run: |
          mkdir -p /tmp/charts
          helm repo add jetstack https://charts.jetstack.io
          helm repo add traefik https://traefik.github.io/charts
          helm package charts/mortise-core -d /tmp/charts
          helm dependency update charts/mortise
          helm package charts/mortise -d /tmp/charts

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Merge new charts into gh-pages index
        run: |
          cp /tmp/charts/*.tgz gh-pages/
          cd gh-pages
          helm repo index . --url https://mortise-org.github.io/mortise --merge index.yaml

      - name: Commit and push gh-pages
        run: |
          cd gh-pages
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m "Publish charts ${{ steps.v.outputs.version }}"
          git push origin gh-pages

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [image, chart]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
