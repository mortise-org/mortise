name: Bug Report
description: Report a bug in Mortise
labels: ["kind/bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out as much as you can.

        **Security issues:** Do NOT use this form. Email security@mortise.dev instead.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Create a Project named ...
        2. Create an App with source type ...
        3. ...
    validations:
      required: true

  - type: input
    id: mortise-version
    attributes:
      label: Mortise version
      description: "`mortise version` or Helm release version"
      placeholder: "0.3.1"
    validations:
      required: true

  - type: input
    id: k8s-version
    attributes:
      label: Kubernetes version
      description: "`kubectl version --short`"
      placeholder: "v1.29.0"
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Installation method
      options:
        - Helm (mortise chart)
        - Helm (mortise-core chart)
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste any relevant logs here. Will be auto-formatted as code.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that might help (App spec, PlatformConfig, etc.)
