metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: platformconfigs.mortise.mortise.dev
spec:
  group: mortise.mortise.dev
  names:
    kind: PlatformConfig
    listKind: PlatformConfigList
    plural: platformconfigs
    singular: platformconfig
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.domain
      name: Domain
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          PlatformConfig is the Schema for the platformconfigs API. It is cluster-scoped
          and there must be exactly one instance named "platform" per cluster.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of PlatformConfig
            properties:
              build:
                description: Build configures the BuildKit daemon used to build App
                  images from source.
                properties:
                  buildkitAddr:
                    description: |-
                      BuildkitAddr is the address of the BuildKit daemon
                      (e.g. tcp://buildkitd:1234 or unix:///run/buildkit/buildkitd.sock).
                    type: string
                  defaultPlatform:
                    default: linux/amd64
                    description: |-
                      DefaultPlatform is the OCI platform string used when building images
                      (e.g. linux/amd64). Defaults to linux/amd64.
                    type: string
                  tlsSecretRef:
                    description: |-
                      TLSSecretRef references a secret containing mTLS credentials for BuildKit
                      (keys: ca.crt, tls.crt, tls.key).
                    properties:
                      key:
                        description: Key within the secret.
                        type: string
                      name:
                        description: Name of the secret.
                        type: string
                      namespace:
                        description: Namespace of the secret.
                        type: string
                    required:
                    - key
                    - name
                    - namespace
                    type: object
                required:
                - buildkitAddr
                type: object
              dns:
                description: DNS configures the provider used to create DNS records
                  for App Ingresses.
                properties:
                  apiTokenSecretRef:
                    description: APITokenSecretRef references the secret containing
                      the DNS provider API token.
                    properties:
                      key:
                        description: Key within the secret.
                        type: string
                      name:
                        description: Name of the secret.
                        type: string
                      namespace:
                        description: Namespace of the secret.
                        type: string
                    required:
                    - key
                    - name
                    - namespace
                    type: object
                  provider:
                    description: Provider is the DNS provider to use for creating
                      records.
                    enum:
                    - cloudflare
                    - route53
                    - externaldns-noop
                    type: string
                required:
                - apiTokenSecretRef
                - provider
                type: object
              domain:
                description: |-
                  Domain is the base domain for the platform. Apps receive subdomains under
                  this domain automatically (e.g. yourdomain.com → app.yourdomain.com).
                type: string
              github:
                description: |-
                  GitHub holds optional overrides for the project-maintained GitHub App.
                  Admins who want to use their own GitHub OAuth App can specify the client
                  ID here; otherwise the device flow uses the built-in default.
                properties:
                  clientID:
                    description: |-
                      ClientID is the OAuth client ID for a self-hosted GitHub App.
                      When set, the device flow uses this instead of the project-maintained default.
                    type: string
                type: object
              registry:
                description: Registry configures the OCI registry used to store built
                  App images.
                properties:
                  credentialsSecretRef:
                    description: |-
                      CredentialsSecretRef references a secret containing Basic or Bearer auth
                      credentials for the registry (keys: username, password).
                    properties:
                      key:
                        description: Key within the secret.
                        type: string
                      name:
                        description: Name of the secret.
                        type: string
                      namespace:
                        description: Namespace of the secret.
                        type: string
                    required:
                    - key
                    - name
                    - namespace
                    type: object
                  insecureSkipTLSVerify:
                    description: |-
                      InsecureSkipTLSVerify disables TLS verification when talking to the registry.
                      Intended for local k3d clusters only.
                    type: boolean
                  namespace:
                    default: mortise
                    description: |-
                      Namespace is the registry namespace under which app images are stored.
                      Defaults to "mortise".
                    type: string
                  pullSecretName:
                    description: |-
                      PullSecretName is the name of the k8s image-pull Secret that carries the
                      registry credentials and is projected into App pods.
                    type: string
                  url:
                    description: URL is the OCI registry endpoint (e.g. registry.example.com).
                    type: string
                required:
                - url
                type: object
              storage:
                description: Storage configures platform-level storage defaults.
                properties:
                  defaultStorageClass:
                    description: |-
                      DefaultStorageClass is the StorageClass to use for App volumes that do not
                      specify their own. If empty, the cluster default StorageClass is used.
                    type: string
                type: object
              tls:
                description: TLS configures TLS certificate issuance for App Ingresses.
                properties:
                  certManagerClusterIssuer:
                    description: |-
                      CertManagerClusterIssuer is the name of the cert-manager ClusterIssuer to
                      use when provisioning TLS certificates for App Ingresses
                      (e.g. letsencrypt-prod).
                    type: string
                type: object
            required:
            - dns
            - domain
            type: object
          status:
            description: status defines the observed state of PlatformConfig
            properties:
              conditions:
                description: Conditions represent the current state of the PlatformConfig
                  resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              phase:
                description: Phase is the current lifecycle phase.
                enum:
                - Pending
                - Ready
                - Failed
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
