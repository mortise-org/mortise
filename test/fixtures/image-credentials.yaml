apiVersion: mortise.mortise.dev/v1alpha1
kind: App
metadata:
  name: test-credentials
spec:
  source:
    type: image
    image: postgres:16
  network:
    public: false
    port: 5432
  credentials:
    # Well-known keys filled in at binder time (not stored in Secret).
    - name: host
    - name: port
    # Inline literal value — materialised into {app}-credentials Secret.
    - name: username
      value: postgres
    # Reference into a user-managed Secret in the same namespace.
    - name: password
      valueFrom:
        secretRef:
          name: test-credentials-backing
          key: pw
  environments:
    - name: production
      replicas: 1
