apiVersion: mortise.mortise.dev/v1alpha1
kind: App
metadata:
  name: test-secret-mount
spec:
  source:
    type: image
    image: nginx:1.27
  network:
    public: true
  environments:
    - name: production
      replicas: 1
      resources:
        cpu: "100m"
        memory: "128Mi"
      secretMounts:
        - name: tls-bundle
          secret: my-app-tls
          path: /etc/ssl/app
