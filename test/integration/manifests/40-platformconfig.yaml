# PlatformConfig wiring for integration tests: points the operator at the
# in-cluster Zot + BuildKit installed by the other manifests in this directory.
# Must be named "platform" (singleton enforced by PlatformConfigReconciler).
apiVersion: mortise.mortise.dev/v1alpha1
kind: PlatformConfig
metadata:
  name: platform
spec:
  domain: integration.test
  registry:
    url: http://registry.mortise-test-deps.svc:5000
    namespace: mortise
    insecureSkipTLSVerify: true
  build:
    buildkitAddr: tcp://buildkitd.mortise-test-deps.svc:1234
    defaultPlatform: linux/amd64
