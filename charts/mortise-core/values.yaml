image:
  repository: ghcr.io/mortise-org/mortise
  tag: 0.1.1
  pullPolicy: IfNotPresent

replicaCount: 1

api:
  port: 8090

operator:
  # ingressClassName sets the Kubernetes IngressClass on App Ingresses.
  # When empty, the cluster default is used.
  ingressClassName: ""

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  # className: ""
  # host: mortise.example.com

resources:
  limits:
    cpu: 2000m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 128Mi

serviceAccount:
  create: true
  name: mortise-controller

github:
  clientID: "Ov23lizLTd25E32VrWwl"
