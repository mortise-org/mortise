apiVersion: v2
name: mortise
description: Self-hosted Railway-style deploy platform for Kubernetes
type: application
version: 0.1.0
appVersion: "0.1.0"

dependencies:
  - name: traefik
    version: "~34.0"
    repository: "https://traefik.github.io/charts"
    condition: traefik.enabled
  - name: cert-manager
    version: "~v1.17"
    repository: "https://charts.jetstack.io"
    condition: cert-manager.enabled
  - name: external-dns
    version: "~1.16"
    repository: "https://kubernetes-sigs.github.io/external-dns"
    condition: external-dns.enabled
  - name: zot
    version: "~0.1"
    repository: "https://zotregistry.dev/helm-charts"
    condition: registry.builtin.enabled
