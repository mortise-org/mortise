image:
  repository: mortise
  tag: dev
  pullPolicy: IfNotPresent

replicaCount: 1

api:
  port: 8090

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  # className: ""
  # host: mortise.example.com

resources:
  limits:
    cpu: 2000m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 128Mi

serviceAccount:
  create: true
  name: mortise-controller

# GitHub OAuth App client ID for device flow.
# This is the Mortise project's public OAuth App — safe to ship.
github:
  clientID: "Ov23lizLTd25E32VrWwl"

# ---------------------------------------------------------------------------
# Bundled infrastructure — disable if your cluster already has these
# ---------------------------------------------------------------------------
traefik:
  enabled: true
  # Traefik values passthrough (users can configure any traefik chart value here)

cert-manager:
  enabled: true
  crds:
    enabled: true    # install CRDs automatically

external-dns:
  enabled: true
  provider:
    name: cloudflare  # default; override in values
  # env passthrough for provider credentials

# Built-in OCI registry (Zot). Disable if using an external registry.
registry:
  builtin:
    enabled: true
