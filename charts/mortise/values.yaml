# ============================================================================
# Mortise — batteries-included deploy platform
# ============================================================================
# This chart bundles the operator (mortise-core), an ingress controller
# (Traefik), cert-manager, a container registry, and BuildKit. Each
# dependency can be disabled if you already have it or don't need it.
#
# For a minimal install (operator + CRDs only), use the mortise-core chart.

# ---------------------------------------------------------------------------
# Operator (mortise-core subchart)
# ---------------------------------------------------------------------------
mortise-core:
  image:
    repository: ghcr.io/mortise-org/mortise
    tag: 0.1.0
    pullPolicy: IfNotPresent

  replicaCount: 1

  api:
    port: 8090

  operator:
    ingressClassName: ""

  service:
    type: ClusterIP
    port: 80

  ingress:
    enabled: false

  resources:
    limits:
      cpu: 2000m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 128Mi

  serviceAccount:
    create: true
    name: mortise-controller

  github:
    clientID: "Ov23lizLTd25E32VrWwl"

# ---------------------------------------------------------------------------
# Traefik — ingress controller
# ---------------------------------------------------------------------------
# Disable if your cluster already has an ingress controller (e.g. k3s
# bundles Traefik, EKS may use ALB, etc.)
traefik:
  enabled: true
  # Values passed to the Traefik subchart. See:
  # https://github.com/traefik/traefik-helm-chart/blob/master/traefik/values.yaml
  logs:
    access:
      enabled: true
      format: json
      fields:
        headers:
          defaultMode: drop

# ---------------------------------------------------------------------------
# cert-manager — automatic TLS certificates
# ---------------------------------------------------------------------------
# Disable if cert-manager is already installed in your cluster.
cert-manager:
  enabled: true
  # Values passed to the cert-manager subchart.
  crds:
    enabled: true

# ---------------------------------------------------------------------------
# Build infrastructure namespace
# ---------------------------------------------------------------------------
buildInfra:
  namespace: mortise-deps

# ---------------------------------------------------------------------------
# OCI registry — stores images built from git source
# ---------------------------------------------------------------------------
# Storage defaults to PVC so built images survive pod restarts. Requires a
# default StorageClass (k3s ships with local-path, cloud providers have their
# own). Set to "emptyDir" only for throwaway dev/test clusters.
registry:
  enabled: true
  image: distribution/distribution:2.8.3
  storage: pvc
  storageSize: 10Gi
  # Node-local pull-through proxy — a DaemonSet that runs on every node so
  # kubelet can pull images from localhost instead of cluster-internal DNS.
  proxy:
    hostPort: 30500

# ---------------------------------------------------------------------------
# BuildKit — builds container images from git source
# ---------------------------------------------------------------------------
# Storage defaults to PVC so the layer cache survives restarts (faster
# rebuilds). Set to "emptyDir" if you don't care about build cache.
buildkit:
  enabled: true
  image: moby/buildkit:v0.29.0
  privileged: true
  storage: pvc
  storageSize: 10Gi

# ---------------------------------------------------------------------------
# metrics-server — provides the PodMetrics API for real-time CPU/memory
# ---------------------------------------------------------------------------
# Disable if metrics-server is already installed in your cluster.
metricsServer:
  enabled: true
  args:
    - --kubelet-insecure-tls

# ---------------------------------------------------------------------------
# Observer — built-in short-term metrics + log history (adapter contract)
# ---------------------------------------------------------------------------
# Provides zero-config observability. Implements the same adapter contract
# that external adapters (Loki, Prometheus) implement, so you can swap it
# out by pointing PlatformConfig.spec.observability at your own adapter.
observer:
  enabled: true
  image: ghcr.io/mortise-org/mortise:0.1.1-observer
  storage: emptyDir
  storageSize: 2Gi
  retention:
    metrics: 72h
    logs: 48h
    traffic: 48h
  metricsPollInterval: 60s
  maxLogPods: 100
  trafficBucketSize: 5s

# ---------------------------------------------------------------------------
# PlatformConfig — auto-created default configuration
# ---------------------------------------------------------------------------
platformConfig:
  enabled: true
  domain: ""
  buildPlatform: ""
  defaults:
    resources:
      cpu: "100m"
      memory: "256Mi"
