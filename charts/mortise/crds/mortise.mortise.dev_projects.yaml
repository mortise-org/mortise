---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: projects.mortise.mortise.dev
spec:
  group: mortise.mortise.dev
  names:
    kind: Project
    listKind: ProjectList
    plural: projects
    singular: project
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.namespace
      name: Namespace
      type: string
    - jsonPath: .status.appCount
      name: Apps
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Project is the Schema for the projects API. It is cluster-scoped; deleting a
          Project cascades to its namespace and every App inside.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ProjectSpec defines the desired state of a Project — the top-level grouping
              above Apps. Each Project owns a Kubernetes namespace (by default
              `project-{metadata.name}`) into which its Apps are placed.
            properties:
              adoptExistingNamespace:
                description: |-
                  AdoptExistingNamespace, when true, tells the controller to adopt a
                  pre-existing Kubernetes namespace that matches the resolved namespace
                  name (default or `namespaceOverride`) by adding this Project's owner
                  reference and `app.kubernetes.io/managed-by: mortise` label. Mortise
                  will never mutate resources it did not create inside the adopted
                  namespace, but deleting the Project will cascade-delete the namespace
                  and everything in it — adoption is a deliberate, admin-only operation.

                  When false (the default), encountering a pre-existing namespace with no
                  Mortise ownership causes the Project to transition to Failed.
                type: boolean
              description:
                description: Description is a short, human-readable note about the
                  project.
                type: string
              namespaceOverride:
                description: |-
                  NamespaceOverride, when set, makes the controller use this name verbatim
                  for the Project's backing namespace instead of the default
                  `project-{name}` form. The value must be a valid DNS-1123 label.

                  This is an admin-only field (enforced at the REST API layer) intended for
                  regulated or enterprise clusters where namespace naming is governed by
                  OPA policies, naming standards, or pre-existing IAM bindings (e.g.
                  cloud IRSA roles keyed off namespace name).
                maxLength: 63
                pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                type: string
            type: object
          status:
            description: ProjectStatus defines the observed state of a Project.
            properties:
              appCount:
                description: AppCount is the number of Apps currently inside this
                  Project's namespace.
                format: int32
                type: integer
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              namespace:
                description: Namespace is the name of the Kubernetes namespace backing
                  this Project.
                type: string
              phase:
                description: Phase is the overall lifecycle phase.
                enum:
                - Pending
                - Ready
                - Terminating
                - Failed
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
