{{- if .Values.observer.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mortise-observer
  namespace: {{ include "mortise.depsNamespace" . }}
  labels:
    app.kubernetes.io/name: mortise-observer
    {{- include "mortise.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mortise-observer
  labels:
    app.kubernetes.io/name: mortise-observer
    {{- include "mortise.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [pods, pods/log]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [services]
    verbs: [get, list, watch]
  - apiGroups: [metrics.k8s.io]
    resources: [pods]
    verbs: [get, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mortise-observer
  labels:
    app.kubernetes.io/name: mortise-observer
    {{- include "mortise.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mortise-observer
subjects:
  - kind: ServiceAccount
    name: mortise-observer
    namespace: {{ include "mortise.depsNamespace" . }}
{{- end }}
