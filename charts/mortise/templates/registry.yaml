{{- if .Values.registry.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: {{ include "mortise.depsNamespace" . }}
  labels:
    app.kubernetes.io/name: registry
    {{- include "mortise.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: registry
  template:
    metadata:
      labels:
        app.kubernetes.io/name: registry
    spec:
      containers:
        - name: registry
          image: {{ .Values.registry.image }}
          imagePullPolicy: IfNotPresent
          env:
            - name: REGISTRY_HTTP_ADDR
              value: "0.0.0.0:5000"
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
          ports:
            - name: http
              containerPort: 5000
          readinessProbe:
            httpGet:
              path: /v2/
              port: 5000
            initialDelaySeconds: 2
            periodSeconds: 2
            failureThreshold: 30
          volumeMounts:
            - name: data
              mountPath: /var/lib/registry
      volumes:
        - name: data
          {{- if eq .Values.registry.storage "emptyDir" }}
          emptyDir: {}
          {{- else }}
          persistentVolumeClaim:
            claimName: registry-data
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: {{ include "mortise.depsNamespace" . }}
  labels:
    app.kubernetes.io/name: registry
    {{- include "mortise.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: registry
  ports:
    - name: http
      port: 5000
      targetPort: 5000
{{- if ne .Values.registry.storage "emptyDir" }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-data
  namespace: {{ include "mortise.depsNamespace" . }}
  labels:
    app.kubernetes.io/name: registry
    {{- include "mortise.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.registry.storageSize | default "10Gi" }}
{{- end }}
{{- end }}
