apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mortise-controller
rules:
  # App CRDs
  - apiGroups: ["mortise.mortise.dev"]
    resources: ["apps", "apps/status", "apps/finalizers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["mortise.mortise.dev"]
    resources: ["platformconfigs", "gitproviders", "previewenvironments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Core resources the operator creates
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services", "secrets", "persistentvolumeclaims", "namespaces"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Pod logs for SSE streaming
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mortise-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mortise-controller
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name }}
    namespace: {{ .Release.Namespace }}
