  v1.ManagedFieldsEntry:
    properties:
      apiVersion:
        description: |-
          APIVersion defines the version of this resource that this field set
          applies to. The format is "group/version" just like the top-level
          APIVersion field. It is necessary to track the version of a field
          set because it cannot be automatically converted.
        type: string
      fieldsType:
        description: |-
          FieldsType is the discriminator for the different fields format and version.
          There is currently only one possible value: "FieldsV1"
        type: string
      fieldsV1:
        allOf:
        - $ref: '#/definitions/v1.FieldsV1'
        description: |-
          FieldsV1 holds the first JSON version format as described in the "FieldsV1" type.
          +optional
      manager:
        description: Manager is an identifier of the workflow managing these fields.
        type: string
      operation:
        allOf:
        - $ref: '#/definitions/v1.ManagedFieldsOperationType'
        description: |-
          Operation is the type of operation which lead to this ManagedFieldsEntry being created.
          The only valid values for this field are 'Apply' and 'Update'.
      subresource:
        description: |-
          Subresource is the name of the subresource used to update that object, or
          empty string if the object was updated through the main resource. The
          value of this field is used to distinguish between managers, even if they
          share the same name. For example, a status update will be distinct from a
          regular update using the same manager name.
          Note that the APIVersion field is not related to the Subresource field and
          it always corresponds to the version of the main resource.
        type: string
      time:
        description: |-
          Time is the timestamp of when the ManagedFields entry was added. The
          timestamp will also be updated if a field is added, the manager
          changes any of the owned fields value or removes a field. The
          timestamp does not update when a field is removed from the entry
          because another manager took it over.
          +optional
        type: string
    type: object
  v1.ManagedFieldsOperationType:
    enum:
    - Apply
    - Update
    type: string
    x-enum-varnames:
    - ManagedFieldsOperationApply
    - ManagedFieldsOperationUpdate
  v1.ObjectMeta:
    properties:
      annotations:
        additionalProperties:
          type: string
        description: |-
          Annotations is an unstructured key value map stored with a resource that may be
          set by external tools to store and retrieve arbitrary metadata. They are not
          queryable and should be preserved when modifying objects.
          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations
          +optional
        type: object
      creationTimestamp:
        description: |-
          CreationTimestamp is a timestamp representing the server time when this object was
          created. It is not guaranteed to be set in happens-before order across separate operations.
          Clients may not set this value. It is represented in RFC3339 form and is in UTC.

          Populated by the system.
          Read-only.
          Null for lists.
          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#metadata
          +optional
        type: string
      deletionGracePeriodSeconds:
        description: |-
          Number of seconds allowed for this object to gracefully terminate before
          it will be removed from the system. Only set when deletionTimestamp is also set.
          May only be shortened.
          Read-only.
          +optional
        type: integer
      deletionTimestamp:
        description: |-
          DeletionTimestamp is RFC 3339 date and time at which this resource will be deleted. This
          field is set by the server when a graceful deletion is requested by the user, and is not
          directly settable by a client. The resource is expected to be deleted (no longer visible
          from resource lists, and not reachable by name) after the time in this field, once the
          finalizers list is empty. As long as the finalizers list contains items, deletion is blocked.
          Once the deletionTimestamp is set, this value may not be unset or be set further into the
          future, although it may be shortened or the resource may be deleted prior to this time.
          For example, a user may request that a pod is deleted in 30 seconds. The Kubelet will react
          by sending a graceful termination signal to the containers in the pod. After that 30 seconds,
          the Kubelet will send a hard termination signal (SIGKILL) to the container and after cleanup,
          remove the pod from the API. In the presence of network partitions, this object may still
          exist after this timestamp, until an administrator or automated process can determine the
          resource is fully terminated.
          If not set, graceful deletion of the object has not been requested.

          Populated by the system when a graceful deletion is requested.
          Read-only.
          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#metadata
          +optional
        type: string
      finalizers:
        description: |-
          Must be empty before the object is deleted from the registry. Each entry
          is an identifier for the responsible component that will remove the entry
          from the list. If the deletionTimestamp of the object is non-nil, entries
          in this list can only be removed.
          Finalizers may be processed and removed in any order.  Order is NOT enforced
          because it introduces significant risk of stuck finalizers.
          finalizers is a shared field, any actor with permission can reorder it.
          If the finalizer list is processed in order, then this can lead to a situation
          in which the component responsible for the first finalizer in the list is
          waiting for a signal (field value, external system, or other) produced by a
          component responsible for a finalizer later in the list, resulting in a deadlock.
          Without enforced ordering finalizers are free to order amongst themselves and
          are not vulnerable to ordering changes in the list.
          +optional
          +patchStrategy=merge
          +listType=set
        items:
          type: string
        type: array
      generateName:
        description: |-
          GenerateName is an optional prefix, used by the server, to generate a unique
          name ONLY IF the Name field has not been provided.
          If this field is used, the name returned to the client will be different
          than the name passed. This value will also be combined with a unique suffix.
          The provided value has the same validation rules as the Name field,
          and may be truncated by the length of the suffix required to make the value
          unique on the server.

          If this field is specified and the generated name exists, the server will return a 409.

          Applied only if Name is not specified.
          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#idempotency
          +optional
        type: string
      generation:
        description: |-
          A sequence number representing a specific generation of the desired state.
          Populated by the system. Read-only.
          +optional
        type: integer
      labels:
        additionalProperties:
          type: string
        description: |-
          Map of string keys and values that can be used to organize and categorize
          (scope and select) objects. May match selectors of replication controllers
          and services.
          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels
          +optional
        type: object
      managedFields:
        description: |-
          ManagedFields maps workflow-id and version to the set of fields
          that are managed by that workflow. This is mostly for internal
          housekeeping, and users typically shouldn't need to set or
          understand this field. A workflow can be the user's name, a
          controller's name, or the name of a specific apply path like
          "ci-cd". The set of fields is always in the version that the
          workflow used when modifying the object.

          +optional
          +listType=atomic
        items:
          $ref: '#/definitions/v1.ManagedFieldsEntry'
        type: array
      name:
        description: |-
          Name must be unique within a namespace. Is required when creating resources, although
          some resources may allow a client to request the generation of an appropriate name
          automatically. Name is primarily intended for creation idempotence and configuration
          definition.
          Cannot be updated.
          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names#names
          +optional
        type: string
      namespace:
        description: |-
          Namespace defines the space within which each name must be unique. An empty namespace is
          equivalent to the "default" namespace, but "default" is the canonical representation.
          Not all objects are required to be scoped to a namespace - the value of this field for
          those objects will be empty.

          Must be a DNS_LABEL.
          Cannot be updated.
          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/namespaces
          +optional
        type: string
      ownerReferences:
        description: |-
          List of objects depended by this object. If ALL objects in the list have
          been deleted, this object will be garbage collected. If this object is managed by a controller,
          then an entry in this list will point to this controller, with the controller field set to true.
          There cannot be more than one managing controller.
          +optional
          +patchMergeKey=uid
          +patchStrategy=merge
          +listType=map
          +listMapKey=uid
        items:
          $ref: '#/definitions/v1.OwnerReference'
        type: array
      resourceVersion:
        description: |-
          An opaque value that represents the internal version of this object that can
          be used by clients to determine when objects have changed. May be used for optimistic
          concurrency, change detection, and the watch operation on a resource or set of resources.
          Clients must treat these values as opaque and passed unmodified back to the server.
          They may only be valid for a particular resource or set of resources.

          Populated by the system.
          Read-only.
          Value must be treated as opaque by clients and .
          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#concurrency-control-and-consistency
          +optional
        type: string
      selfLink:
        description: |-
          Deprecated: selfLink is a legacy read-only field that is no longer populated by the system.
          +optional
        type: string
      uid:
        description: |-
          UID is the unique in time and space value for this object. It is typically generated by
          the server on successful creation of a resource and is not allowed to change on PUT
          operations.

          Populated by the system.
          Read-only.
          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names#uids
          +optional
        type: string
    type: object
  v1.OwnerReference:
    properties:
      apiVersion:
        description: API version of the referent.
        type: string
      blockOwnerDeletion:
        description: |-
          If true, AND if the owner has the "foregroundDeletion" finalizer, then
          the owner cannot be deleted from the key-value store until this
          reference is removed.
          See https://kubernetes.io/docs/concepts/architecture/garbage-collection/#foreground-deletion
          for how the garbage collector interacts with this field and enforces the foreground deletion.
          Defaults to false.
          To set this field, a user needs "delete" permission of the owner,
          otherwise 422 (Unprocessable Entity) will be returned.
          +optional
        type: boolean
      controller:
        description: |-
          If true, this reference points to the managing controller.
          +optional
        type: boolean
      kind:
        description: |-
          Kind of the referent.
          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
        type: string
      name:
        description: |-
          Name of the referent.
          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names#names
        type: string
      uid:
        description: |-
          UID of the referent.
          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names#uids
        type: string
    type: object
  v1alpha1.App:
    properties:
      apiVersion:
        description: |-
          APIVersion defines the versioned schema of this representation of an object.
          Servers should convert recognized schemas to the latest internal value, and
          may reject unrecognized values.
          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
          +optional
        type: string
      kind:
        description: |-
          Kind is a string value representing the REST resource this object represents.
          Servers may infer this from the endpoint the client submits requests to.
          Cannot be updated.
          In CamelCase.
          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
          +optional
        type: string
      metadata:
        allOf:
        - $ref: '#/definitions/v1.ObjectMeta'
        description: +optional
      spec:
        allOf:
        - $ref: '#/definitions/v1alpha1.AppSpec'
        description: +required
      status:
        allOf:
        - $ref: '#/definitions/v1alpha1.AppStatus'
        description: +optional
    type: object
  v1alpha1.AppKind:
    enum:
    - service
    - cron
    type: string
    x-enum-varnames:
    - AppKindService
    - AppKindCron
  v1alpha1.AppPhase:
    enum:
    - Pending
    - Building
    - Deploying
    - Ready
    - CrashLooping
    - Failed
    type: string
    x-enum-varnames:
    - AppPhasePending
    - AppPhaseBuilding
    - AppPhaseDeploying
    - AppPhaseReady
    - AppPhaseCrashLooping
    - AppPhaseFailed
  v1alpha1.AppSource:
    properties:
      branch:
        type: string
      build:
        $ref: '#/definitions/v1alpha1.Build'
      external:
        allOf:
        - $ref: '#/definitions/v1alpha1.ExternalSource'
        description: |-
          External source fields (used when type=external). Wraps an
          already-running service that Mortise did not deploy. Mortise creates
          no pods; the App exists primarily as a binding target.
      image:
        description: Image source fields (used when type=image)
        type: string
      path:
        type: string
      providerRef:
        description: |-
          ProviderRef is the name of the GitProvider CRD that holds credentials for
          this repo's forge. Required when type=git.
          +optional
        type: string
      pullSecretRef:
        type: string
      repo:
        description: Git source fields (used when type=git)
        type: string
      type:
        allOf:
        - $ref: '#/definitions/v1alpha1.SourceType'
        description: +kubebuilder:validation:Required
      watchPaths:
        items:
          type: string
        type: array
    type: object
  v1alpha1.AppSpec:
    properties:
      configFiles:
        description: |-
          ConfigFiles defines files to mount into containers via ConfigMaps.
          Each entry creates a ConfigMap and mounts it at the specified path.
          +optional
        items:
          $ref: '#/definitions/v1alpha1.ConfigFile'
        type: array
      credentials:
        description: |-
          Credentials declares the keys this App exposes to binders. The App
          controller materialises the `{app}-credentials` Secret from these
          entries; the bindings resolver projects them into binder Pods (spec §5.5a).
          +optional
        items:
          $ref: '#/definitions/v1alpha1.Credential'
        type: array
      environments:
        description: |-
          Environments carries per-environment overrides (resources, env vars,
          domain, replicas, etc.) for the project-level environments declared on
          the parent `Project.Spec.Environments`. Any App auto-exists in every
          project env; entries here only tune behavior for a specific env or opt
          out via `Enabled: false`. Names must match a `ProjectEnvironment.Name`
          on the parent Project (enforced by the admission webhook).
        items:
          $ref: '#/definitions/v1alpha1.Environment'
        type: array
      kind:
        allOf:
        - $ref: '#/definitions/v1alpha1.AppKind'
        description: |-
          Kind selects the workload type: "service" (default) reconciles to a
          Deployment; "cron" reconciles to a CronJob.
          +optional
          +kubebuilder:default="service"
      network:
        $ref: '#/definitions/v1alpha1.NetworkConfig'
      sharedVars:
        description: |-
          SharedVars are app-wide env vars visible to every environment of this
          App. They sit at priority level 3 in the variable resolution order
          (spec §5.8b): platform defaults < bound credentials < sharedVars <
          env-level vars. Use for values like LOG_LEVEL, SENTRY_DSN, or feature
          flags that should not be repeated per environment.
          +optional
        items:
          $ref: '#/definitions/v1alpha1.EnvVar'
        type: array
      source:
        allOf:
        - $ref: '#/definitions/v1alpha1.AppSource'
        description: +kubebuilder:validation:Required
      storage:
        items:
          $ref: '#/definitions/v1alpha1.VolumeSpec'
        type: array
    type: object
  v1alpha1.AppStatus:
    properties:
      conditions:
        description: |-
          +listType=map
          +listMapKey=type
          +optional
        items:
          $ref: '#/definitions/v1.Condition'
        type: array
      environments:
        items:
          $ref: '#/definitions/v1alpha1.EnvironmentStatus'
        type: array
      lastBuiltImage:
        description: |-
          LastBuiltImage is the full image reference (including digest) produced by the
          most recently completed build. The Deployment spec is set to this value.
          +optional
        type: string
      lastBuiltSHA:
        description: |-
          LastBuiltSHA is the git commit SHA of the most recently completed build.
          The reconciler uses this to short-circuit rebuilds when the revision hasn't changed.
          +optional
        type: string
      phase:
        $ref: '#/definitions/v1alpha1.AppPhase'
    type: object
  v1alpha1.Binding:
    properties:
      ref:
        description: Ref is the name of the bound App within the same project.
        type: string
    type: object
  v1alpha1.Build:
    properties:
      args:
        additionalProperties:
          type: string
        type: object
      cache:
        type: boolean
      context:
        $ref: '#/definitions/v1alpha1.BuildContext'
      dockerfilePath:
        type: string
      mode:
        $ref: '#/definitions/v1alpha1.BuildMode'
    type: object
  v1alpha1.BuildContext:
    enum:
    - root
    - subdir
    type: string
    x-enum-varnames:
    - BuildContextRoot
    - BuildContextSubdir
  v1alpha1.BuildMode:
    enum:
    - auto
    - dockerfile
    - railpack
    type: string
    x-enum-varnames:
    - BuildModeAuto
    - BuildModeDockerfile
    - BuildModeRailpack
  v1alpha1.ConcurrencyPolicy:
    enum:
    - Allow
    - Forbid
    - Replace
    type: string
    x-enum-varnames:
    - ConcurrencyPolicyAllow
    - ConcurrencyPolicyForbid
    - ConcurrencyPolicyReplace
  v1alpha1.ConfigFile:
    properties:
      content:
        description: |-
          Content is the file content.
          +kubebuilder:validation:Required
        type: string
      path:
        description: |-
          Path is the absolute mount path inside the container.
          Must start with "/", contain no null bytes, and be <= PATH_MAX (4096).
          +kubebuilder:validation:Required
          +kubebuilder:validation:MinLength=2
          +kubebuilder:validation:MaxLength=4096
          +kubebuilder:validation:Pattern=`^/[^\x00]+$`
        type: string
    type: object
  v1alpha1.Credential:
    properties:
      name:
        description: |-
          Name is the key written into the {app}-credentials Secret and the env
          var name projected into binders.
          +kubebuilder:validation:Required
          +kubebuilder:validation:Pattern=`^[a-zA-Z_][a-zA-Z0-9_]*$`
          +kubebuilder:validation:MaxLength=253
        type: string
      value:
        description: |-
          Value is the inline credential value. Mutually exclusive with ValueFrom.
          +optional
        type: string
      valueFrom:
        allOf:
        - $ref: '#/definitions/v1alpha1.CredentialSource'
        description: |-
          ValueFrom references a key in a user-managed Secret in the App's own
          namespace. Mutually exclusive with Value.
          +optional
    type: object
  v1alpha1.CredentialSource:
    properties:
      secretRef:
        allOf:
        - $ref: '#/definitions/v1alpha1.SecretKeyRef'
        description: |-
          SecretRef references a key in a Secret in the App's own namespace.
          +optional
    type: object
  v1alpha1.DeployRecord:
    properties:
      digest:
        type: string
      gitSHA:
        type: string
      image:
        type: string
      timestamp:
        type: string
    type: object
  v1alpha1.EnvTLSConfig:
    properties:
      clusterIssuer:
        description: |-
          ClusterIssuer overrides the PlatformConfig default cert-manager
          ClusterIssuer for this environment. Ignored if SecretName is also set
          (BYO Secret takes precedence).
          +optional
        type: string
      secretName:
        description: |-
          SecretName points at a pre-existing k8s Secret in the App's namespace
          containing tls.crt / tls.key. When set, Mortise skips the cert-manager
          annotation entirely and wires the Ingress TLS block to this Secret.
          +optional
        type: string
    type: object
  v1alpha1.EnvVar:
    properties:
      name:
        type: string
      value:
        type: string
      valueFrom:
        $ref: '#/definitions/v1alpha1.EnvVarSource'
    type: object
  v1alpha1.EnvVarSource:
    properties:
      secretRef:
        type: string
    type: object
  v1alpha1.Environment:
    properties:
      annotations:
        additionalProperties:
          type: string
        description: |-
          Annotations are passed through to every k8s resource Mortise creates for
          this environment (Deployment, pod template, Service, Ingress, PVCs).
          User-supplied keys win on conflict with Mortise-owned annotations (spec §5.2a).
          +optional
        type: object
      bindings:
        items:
          $ref: '#/definitions/v1alpha1.Binding'
        type: array
      concurrencyPolicy:
        allOf:
        - $ref: '#/definitions/v1alpha1.ConcurrencyPolicy'
        description: |-
          ConcurrencyPolicy controls whether concurrent executions of the CronJob
          are allowed. Valid values: Allow, Forbid, Replace. Default: Allow.
          Only used when spec.kind is "cron".
          +optional
          +kubebuilder:default="Allow"
      customDomains:
        items:
          type: string
        type: array
      domain:
        type: string
      enabled:
        description: |-
          Enabled, when set to false, opts this App out of the named project
          environment. The App controller GCs any resources it previously
          reconciled for that env. A nil pointer means "enabled" — Apps
          auto-participate in every project environment by default.
          +optional
        type: boolean
      env:
        items:
          $ref: '#/definitions/v1alpha1.EnvVar'
        type: array
      name:
        description: |-
          Name references a `ProjectEnvironment.Name` on the parent Project. The
          admission webhook rejects names not present on the parent Project.
          +kubebuilder:validation:Required
        type: string
      replicas:
        type: integer
      resources:
        $ref: '#/definitions/v1alpha1.ResourceRequirements'
      schedule:
        description: |-
          Schedule is a cron expression (e.g. "*/5 * * * *") that controls when
          the CronJob fires. Required when spec.kind is "cron"; ignored otherwise.
          +optional
        type: string
      secretMounts:
        description: |-
          SecretMounts mounts existing k8s Secrets in the App's namespace as
          files on the container filesystem. See spec §5.5b. Each entry becomes
          a `Volume` + `VolumeMount` on the Deployment's Pod template. Names
          must not collide with `spec.storage[].name` — the operator does not
          reconcile such collisions; the apiserver will reject the Deployment.
          +optional
        items:
          $ref: '#/definitions/v1alpha1.SecretMount'
        type: array
      tls:
        allOf:
        - $ref: '#/definitions/v1alpha1.EnvTLSConfig'
        description: |-
          TLS overrides the default cert-manager-driven TLS path for this
          environment's Ingress (spec §5.6). If nil the operator writes the
          PlatformConfig default cluster-issuer annotation and auto-generates the
          Secret name.
          +optional
    type: object
  v1alpha1.EnvironmentStatus:
    properties:
      currentDigest:
        type: string
      currentImage:
        type: string
      deployHistory:
        items:
          $ref: '#/definitions/v1alpha1.DeployRecord'
        type: array
      domain:
        description: |-
          Domain is the resolved hostname for this environment. Computed by the
          controller from spec or auto-generated from the platform domain. The
          UI reads this to show "Your app is at {domain}".
          +optional
        type: string
      message:
        type: string
      name:
        type: string
      phase:
        $ref: '#/definitions/v1alpha1.AppPhase'
      readyReplicas:
        type: integer
    type: object
  v1alpha1.ExternalSource:
    properties:
      host:
        description: |-
          Host is the DNS name or IP of the external service.
          +kubebuilder:validation:Required
        type: string
      port:
        description: |-
          Port is the port the external service listens on. Optional; used by
          the bindings resolver for the well-known "port" credential and by
          Ingress backends when network.public is true.
          +optional
        type: integer
    type: object
  v1alpha1.GitProviderPhase:
    enum:
    - Pending
    - Ready
    - Failed
    type: string
    x-enum-varnames:
    - GitProviderPhasePending
    - GitProviderPhaseReady
    - GitProviderPhaseFailed
  v1alpha1.GitProviderType:
    enum:
    - github
    - gitlab
    - gitea
    type: string
    x-enum-varnames:
    - GitProviderTypeGitHub
    - GitProviderTypeGitLab
    - GitProviderTypeGitea
  v1alpha1.KeyToPath:
    properties:
      key:
        description: |-
          Key is the Secret key to project.
          +kubebuilder:validation:Required
        type: string
      mode:
        description: |-
          Mode is the file mode bits for the projected file (e.g. 0400).
          +optional
        type: integer
      path:
        description: |-
          Path is the filename (relative to the mount path) to write the key's
          value to.
          +kubebuilder:validation:Required
        type: string
    type: object
  v1alpha1.NetworkConfig:
    properties:
      port:
        description: |-
          Port is the container port the app listens on. Defaults to 8080.
          The Service always exposes port 80 for HTTP; this controls the
          targetPort on the Service and containerPort on the Deployment.
          +optional
          +kubebuilder:default=8080
        type: integer
      public:
        description: |-
          Public toggles whether an Ingress is created for this App.
          Note: no `omitempty` on purpose — `false` must survive JSON
          marshalling (see commit c7c58a2). The API server applies the default
          on create when the field is missing entirely.
          +optional
          +kubebuilder:default=true
        type: boolean
    type: object
  v1alpha1.PlatformConfigPhase:
    enum:
    - Pending
    - Ready
    - Failed
    type: string
    x-enum-varnames:
    - PlatformConfigPhasePending
    - PlatformConfigPhaseReady
    - PlatformConfigPhaseFailed
  v1alpha1.ProjectPhase:
    enum:
    - Pending
    - Ready
    - Terminating
    - Failed
    type: string
    x-enum-varnames:
    - ProjectPhasePending
    - ProjectPhaseReady
    - ProjectPhaseTerminating
    - ProjectPhaseFailed
  v1alpha1.ResourceRequirements:
    properties:
      cpu:
        type: string
      memory:
        type: string
    type: object
  v1alpha1.SecretKeyRef:
    properties:
      key:
        description: |-
          Key within the Secret.
          +kubebuilder:validation:Required
        type: string
      name:
        description: |-
          Name of the Secret in the App's namespace.
          +kubebuilder:validation:Required
        type: string
    type: object
  v1alpha1.SecretMount:
    properties:
      items:
        description: |-
          Items projects specific Secret keys to specific filenames (and
          optional file modes) under Path. When empty, every key in the Secret
          is surfaced as a file whose name matches the key.
          +optional
        items:
          $ref: '#/definitions/v1alpha1.KeyToPath'
        type: array
      name:
        description: |-
          Name is the Pod volume name. Must be a DNS-1123 label.
          +kubebuilder:validation:Required
          +kubebuilder:validation:Pattern=`^[a-z0-9]([-a-z0-9]*[a-z0-9])?$`
          +kubebuilder:validation:MaxLength=63
        type: string
      path:
        description: |-
          Path is the absolute mount path inside the container. Must begin with
          a slash.
          +kubebuilder:validation:Required
          +kubebuilder:validation:Pattern=`^/.*`
        type: string
      readOnly:
        description: |-
          ReadOnly defaults to true when unset. Pointer so that an explicit
          `false` is distinguishable from the omitted default.
          +optional
        type: boolean
      secret:
        description: |-
          Secret names an existing k8s Secret in the App's namespace. Mortise
          does not create or manage this Secret.
          +kubebuilder:validation:Required
        type: string
    type: object
  v1alpha1.SourceType:
    enum:
    - git
    - image
    - external
    type: string
    x-enum-varnames:
    - SourceTypeGit
    - SourceTypeImage
    - SourceTypeExternal
  v1alpha1.StorageConfig:
    properties:
      defaultStorageClass:
        description: |-
          DefaultStorageClass is the StorageClass to use for App volumes that do not
          specify their own. If empty, the cluster default StorageClass is used.
          +optional
        type: string
    type: object
  v1alpha1.VolumeSpec:
    properties:
      accessMode:
        type: string
      mountPath:
        description: +kubebuilder:validation:Required
        type: string
      name:
        description: +kubebuilder:validation:Required
        type: string
      size:
        $ref: '#/definitions/resource.Quantity'
      storageClass:
        type: string
    type: object
host: localhost:8090
info:
  contact: {}
  description: Self-hosted Railway-style deploy platform for Kubernetes. Manages projects,
    apps, deployments, env vars, secrets, domains, and git providers.
  title: Mortise API
  version: 0.1.0
paths:
  /activity:
    get:
      description: Returns recent activity across all projects the caller can read,
        newest first
      parameters:
      - description: 'Max number of events (default: 100)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/activity.Event'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.errorResponse'
      security:
      - BearerAuth: []
      summary: List platform-wide activity
      tags:
      - activity
  /admin/users:
    get:
      description: Returns all platform users. Admin-only.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api.userResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.errorResponse'
      security:
      - BearerAuth: []
      summary: List users
      tags:
      - users
    post:
      consumes:
      - application/json
      description: Creates a new platform user. Admin-only.
      parameters:
      - description: User details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.createUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.userResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.errorResponse'
        "501":
          description: Not Implemented
          schema:
            $ref: '#/definitions/api.errorResponse'
      security:
      - BearerAuth: []
      summary: Create a user
      tags:
      - users
  /admin/users/{email}:
    delete:
      description: Removes a platform user. Admin-only.
      parameters:
      - description: User email
        in: path
        name: email
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.errorResponse'
      security:
      - BearerAuth: []
      summary: Delete a user
      tags:
      - users
    patch:
      consumes:
      - application/json
      description: Changes a platform user's role. Admin-only.
      parameters:
      - description: User email
        in: path
        name: email
        required: true
        type: string
      - description: New role
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.updateUserRoleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.userResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.errorResponse'
      security:
      - BearerAuth: []
      summary: Update a user's role
      tags:
      - users
  /auth/git/{provider}/device:
    post:
      description: Requests a device code from the git forge to start OAuth device
        authorization
      parameters:
      - description: Git provider name
        in: path
        name: provider
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.deviceCodeResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.errorResponse'
        "502":
          description: Failed to contact git provider
          schema:
            type: string
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/api.errorResponse'
      security:
      - BearerAuth: []
      summary: Initiate device flow
      tags:
      - device-flow
  /auth/git/{provider}/device/poll:
    post:
      consumes:
      - application/json
      description: Checks whether the user has completed device flow authorization
        and stores the token on success
      parameters:
      - description: Git provider name
        in: path
        name: provider
        required: true
        type: string
      - description: Device code to poll
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.devicePollRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.devicePollResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.errorResponse'
        "502":
          description: Failed to contact git provider
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Poll device flow status
      tags:
      - device-flow
  /auth/git/{provider}/status:
    get:
      description: Returns whether the calling user has a stored token for the given
        git provider
      parameters:
      - description: Git provider name
        in: path
        name: provider
        required: true
        type: string
      produces:
      - application/json
      responses:
