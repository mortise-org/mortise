services:
  postgres:
    image: supabase/postgres:15.6.1.143
    ports: ["5432:5432"]
    volumes:
      - ./files/init.sql:/docker-entrypoint-initdb.d/00-init.sql
    environment:
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: supabase
      JWT_SECRET: ${JWT_SECRET}
      SUPABASE_AUTH_ADMIN_PASSWORD: ${PG_PASSWORD}
      SUPABASE_STORAGE_ADMIN_PASSWORD: ${PG_PASSWORD}

  auth:
    image: supabase/gotrue:v2.164.0
    depends_on: [postgres]
    ports: ["9999:9999"]
    environment:
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_admin:${PG_PASSWORD}@supabase-postgres:5432/supabase?sslmode=disable
      DATABASE_URL: postgres://supabase_admin:${PG_PASSWORD}@supabase-postgres:5432/supabase?sslmode=disable
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: "3600"
      GOTRUE_SITE_URL: http://localhost
      API_EXTERNAL_URL: http://localhost
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_DISABLE_SIGNUP: "false"
      PORT: "9999"

  rest:
    image: postgrest/postgrest:v12.2.3
    depends_on: [postgres]
    ports: ["3000:3000"]
    environment:
      PGRST_DB_URI: postgres://supabase_admin:${PG_PASSWORD}@supabase-postgres:5432/supabase
      PGRST_DB_SCHEMA: public,storage
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"

  storage:
    image: supabase/storage-api:v1.11.13
    depends_on: [postgres]
    ports: ["5000:5000"]
    environment:
      DATABASE_URL: postgres://supabase_admin:${PG_PASSWORD}@supabase-postgres:5432/supabase
      PGRST_JWT_SECRET: ${JWT_SECRET}
      ANON_KEY: ${JWT_SECRET}
      SERVICE_KEY: ${JWT_SECRET}
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage

  realtime:
    image: supabase/realtime:v2.85.2
    depends_on: [postgres]
    ports: ["4000:4000"]
    environment:
      DB_HOST: supabase-postgres
      DB_PORT: "5432"
      DB_USER: supabase_admin
      DB_PASSWORD: ${PG_PASSWORD}
      DB_NAME: supabase
      JWT_SECRET: ${JWT_SECRET}
      API_JWT_SECRET: ${JWT_SECRET}
      METRICS_JWT_SECRET: ${JWT_SECRET}
      APP_NAME: realtime
      SELF_HOSTED: "true"
      PORT: "4000"
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      ERL_AFLAGS: "-proto_dist inet_tcp"
      RLIMIT_NOFILE: "10000"
      FLY_ALLOC_ID: fly123
      FLY_APP_NAME: realtime
      DNS_NODES: "''"

  studio:
    image: supabase/studio:2026.04.13-sha-e95f1cc
    depends_on: [postgres]
    ports: ["3001:3000"]
    environment:
      STUDIO_PG_META_URL: http://supabase-rest:3000
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      SUPABASE_URL: http://supabase-rest:3000
      SUPABASE_REST_URL: http://supabase-rest:3000/rest/v1
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      DEFAULT_ORGANIZATION_NAME: Default Organization
      DEFAULT_PROJECT_NAME: Default Project
      PORT: "3000"
